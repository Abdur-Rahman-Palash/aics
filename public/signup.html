<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICS - Sign Up</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🤖 AICS</h1>
                <p>AI Customer Support</p>
            </div>
            <div id="message"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a password (min 6 characters)">
                    <div class="password-strength-wrapper">
                        <div id="strength-bar" class="strength-bar"></div>
                        <span id="strength-text" class="strength-text"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            <div class="toggle-form">
                Already have an account? <a href="/login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="/js/csrf-helper.js"></script>
    <script>
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        const emailInput = document.getElementById('email');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 5000);
        }

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            let strengthClass = '';
            let strengthLabel = '';

            if (strength <= 1) {
                strengthClass = 'strength-weak';
                strengthLabel = 'Weak';
            } else if (strength <= 3) {
                strengthClass = 'strength-medium';
                strengthLabel = 'Medium';
            } else {
                strengthClass = 'strength-strong';
                strengthLabel = 'Strong';
            }

            return { strengthClass, strengthLabel };
        }

        passwordInput.addEventListener('input', () => {
            const { strengthClass, strengthLabel } = checkPasswordStrength(passwordInput.value);
            strengthBar.className = 'strength-bar ' + strengthClass;
            strengthText.textContent = strengthLabel;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (name.length < 2) {
                showMessage('Name must be at least 2 characters long', 'error');
                return;
            }

            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetchWithCsrf('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();

                if (data.success) {
                    showMessage('Sign up successful! Redirecting to dashboard...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Failed to sign up. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
