<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICS - AI Customer Support</title>
    <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
     <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <script>
        // Load businesses and initialize chat widget with first business
        async function init() {
            try {
                const response = await fetch('/api/businesses');
                const data = await response.json();
                if (data.success && data.businesses.length > 0) {
                    const business = data.businesses[0];
                    // Create script tag with business ID
                    const script = document.createElement('script');
                    script.src = '/js/chat-widget.js';
                    script.setAttribute('data-business-id', business.id);
                    document.body.appendChild(script);
                } else {
                    document.body.innerHTML = '<div style="font-family: sans-serif; padding: 40px; text-align: center;"><h1>No business configured</h1><p>Please sign in and create a business first, or configure a default business for this site.</p></div>';
                }
            } catch (error) {
                document.body.innerHTML = '<div style="font-family: sans-serif; padding: 40px; text-align: center;"><h1>Unable to load widget</h1><p>There was a problem loading the business configuration. Please try again later or sign in to manage your business settings.</p></div>';
            }
        }

        init();
    </script>
</body>
</html>
