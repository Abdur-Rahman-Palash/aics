services:
  - type: web
    name: aics-app
    runtime: node
    repo: https://github.com/Abdur-Rahman-Palash/aics # Replace with your repo
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: DATA_DIR
        value: /var/data
    disks:
      - name: data
        mountPath: /var/data
        sizeGB: 1
